<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Sheet</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input {
            margin-bottom: 10px;
        }
        #total, #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Grade Sheet</h1>

<label>English:</label>
<input type="number" id="English">

<label>Nepali:</label>
<input type="number" id="Nepali">

<label>Science:</label>
<input type="number" id="Science">

<label>Maths:</label>
<input type="number" id="Maths">

<label>Social Studies:</label>
<input type="number" id="socialStudies">

<label>Optional Math:</label>
<input type="number" id="optionalMath">

<label>Computer Science:</label>
<input type="number" id="computerScience">

<label>Health:</label>
<input type="number" id="Health">

<br><br>

<button type="button" onclick="calculateGrades()">Calculate Grades</button>

<div id="total"></div>
<div id="result"></div>

<script>
function calculateGrades() {

    // Variables
    let english = Number(document.getElementById("English").value);
    let nepali = Number(document.getElementById("Nepali").value);
    let science = Number(document.getElementById("Science").value);
    let maths = Number(document.getElementById("Maths").value);
    let social = Number(document.getElementById("socialStudies").value);
    let optional = Number(document.getElementById("optionalMath").value);
    let computer = Number(document.getElementById("computerScience").value);
    let health = Number(document.getElementById("Health").value);

    // Operators
    let totalMarks = english + nepali + science + maths + social + optional + computer + health;

    // Display total
    document.getElementById("total").innerHTML = "Total Marks: " + totalMarks;

    let result = document.getElementById("result");
    result.style.color = "black";

    // Control statements
    if (totalMarks >= 700) {
        result.innerHTML = "Distinction";
        result.style.color = "green";
    } else if (totalMarks >= 600) {
        result.innerHTML = "First Division";
    } else if (totalMarks >= 500) {
        result.innerHTML = "Second Division";
    } else if (totalMarks >= 400) {
        result.innerHTML = "Third Division";
    } else {
        result.innerHTML = "Fail";
        result.style.color = "red";
    }
}
</script>

</body>
</html>
